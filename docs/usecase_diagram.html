<!DOCTYPE html>
<html lang="vi">

<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    justify-content: center;
    padding: 20px;
  }
  svg {
    max-width: 100%;
    height: auto;
  }
  .actor-label {
    font-size: 13px;
    font-weight: bold;
    text-anchor: middle;
    fill: #000;
  }
  .usecase-label {
    font-size: 11px;
    text-anchor: middle;
    fill: #000;
  }
  .system-label {
    font-size: 16px;
    font-weight: bold;
    text-anchor: middle;
    fill: #000;
  }
  .relation-label {
    font-size: 10px;
    font-style: italic;
    fill: #000;
    text-anchor: middle;
  }
  .line {
    stroke: #000;
    stroke-width: 1.5;
    fill: none;
  }

    stroke-dasharray: 6, 4;

  .usecase-ellipse {

    stroke: #000;
    stroke-width: 1.5;
  }
  .system-rect {
    fill: none;
    stroke: #000;
