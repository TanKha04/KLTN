<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" width="1100" height="750">
  <defs>
    <style>
      .usecase { fill: #fff; stroke: #333; stroke-width: 1.5; }
      .actor-line { stroke: #333; stroke-width: 1.5; }
      .line { stroke: #333; stroke-width: 1; fill: none; }
      .line-dashed { stroke: #333; stroke-width: 1; fill: none; stroke-dasharray: 5,3; }
      .text-usecase { font-family: Arial, sans-serif; font-size: 10px; fill: #333; text-anchor: middle; }
      .text-actor { font-family: Arial, sans-serif; font-size: 11px; fill: #333; text-anchor: middle; }
      .text-relation { font-family: Arial, sans-serif; font-size: 8px; fill: #333; font-style: italic; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1100" height="750" fill="#FAFAFA"/>
  
  <!-- ==================== ACTORS ==================== -->
  
  <!-- Khách - Right Top -->
  <g transform="translate(1000, 120)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="35" class="actor-line"/>
    <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
    <line x1="0" y1="35" x2="-12" y2="55" class="actor-line"/>
    <line x1="0" y1="35" x2="12" y2="55" class="actor-line"/>
    <text class="text-actor" x="0" y="72">Khách</text>
  </g>
  
  <!-- Người dùng - Left -->
  <g transform="translate(100, 220)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="35" class="actor-line"/>
    <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
    <line x1="0" y1="35" x2="-12" y2="55" class="actor-line"/>
    <line x1="0" y1="35" x2="12" y2="55" class="actor-line"/>
    <text class="text-actor" x="0" y="72">Người dùng</text>
  </g>
  
  <!-- Bệnh nhân - Left Middle -->
  <g transform="translate(100, 420)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="35" class="actor-line"/>
    <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
    <line x1="0" y1="35" x2="-12" y2="55" class="actor-line"/>
    <line x1="0" y1="35" x2="12" y2="55" class="actor-line"/>
    <text class="text-actor" x="0" y="72">Bệnh nhân</text>
  </g>
  
  <!-- Sinh viên - Right Middle -->
  <g transform="translate(1000, 420)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="35" class="actor-line"/>
    <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
    <line x1="0" y1="35" x2="-12" y2="55" class="actor-line"/>
    <line x1="0" y1="35" x2="12" y2="55" class="actor-line"/>
    <text class="text-actor" x="0" y="72">Sinh viên</text>
  </g>
  
  <!-- Quản trị viên - Left Bottom -->
  <g transform="translate(100, 640)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="35" class="actor-line"/>
    <line x1="-15" y1="22" x2="15" y2="22" class="actor-line"/>
    <line x1="0" y1="35" x2="-12" y2="55" class="actor-line"/>
    <line x1="0" y1="35" x2="12" y2="55" class="actor-line"/>
    <text class="text-actor" x="0" y="72">Quản trị viên</text>
  </g>
  
  <!-- ==================== USE CASES ==================== -->
  
  <!-- KHÁCH Use Cases -->
  <ellipse class="usecase" cx="800" cy="80" rx="70" ry="24"/>
  <text class="text-usecase" x="800" y="84">Đăng ký tài khoản</text>
  
  <ellipse class="usecase" cx="800" cy="170" rx="60" ry="22"/>
  <text class="text-usecase" x="800" y="174">Xác minh email</text>
  
  <!-- NGƯỜI DÙNG Use Cases -->
  <ellipse class="usecase" cx="320" cy="70" rx="70" ry="26"/>
  <text class="text-usecase" x="320" y="66">Kiểm tra thông tin</text>
  <text class="text-usecase" x="320" y="78">đăng nhập</text>
  
  <ellipse class="usecase" cx="500" cy="70" rx="65" ry="22"/>
  <text class="text-usecase" x="500" y="74">Xử lý lỗi đăng nhập</text>
  
  <ellipse class="usecase" cx="320" cy="150" rx="55" ry="22"/>
  <text class="text-usecase" x="320" y="154">Đăng nhập</text>
  
  <ellipse class="usecase" cx="320" cy="220" rx="50" ry="20"/>
  <text class="text-usecase" x="320" y="224">Đăng xuất</text>
  
  <!-- SHARED Use Cases (Center) - Tất cả đều dùng -->
  <ellipse class="usecase" cx="600" cy="220" rx="75" ry="26"/>
  <text class="text-usecase" x="600" y="216">Xem danh sách</text>
  <text class="text-usecase" x="600" y="228">bài đăng</text>
  
  <ellipse class="usecase" cx="600" cy="290" rx="70" ry="22"/>
  <text class="text-usecase" x="600" y="294">Tìm kiếm bài đăng</text>
  
  <!-- BỆNH NHÂN Use Cases -->
  <ellipse class="usecase" cx="320" cy="360" rx="70" ry="26"/>
  <text class="text-usecase" x="320" y="356">Đăng bài</text>
  <text class="text-usecase" x="320" y="368">tuyển dụng</text>
  
  <ellipse class="usecase" cx="320" cy="430" rx="65" ry="22"/>
  <text class="text-usecase" x="320" y="434">Cập nhật bài đăng</text>
  
  <ellipse class="usecase" cx="320" cy="495" rx="55" ry="20"/>
  <text class="text-usecase" x="320" y="499">Xóa bài đăng</text>
  
  <!-- SHARED Use Cases - Bệnh nhân & Sinh viên -->
  <ellipse class="usecase" cx="550" cy="380" rx="55" ry="22"/>
  <text class="text-usecase" x="550" y="384">Đặt lịch hẹn</text>
  
  <ellipse class="usecase" cx="550" cy="450" rx="70" ry="22"/>
  <text class="text-usecase" x="550" y="454">Nhắn tin trao đổi</text>
  
  <ellipse class="usecase" cx="420" cy="530" rx="70" ry="22"/>
  <text class="text-usecase" x="420" y="534">Đánh giá sinh viên</text>
  
  <ellipse class="usecase" cx="680" cy="530" rx="70" ry="22"/>
  <text class="text-usecase" x="680" y="534">Đánh giá bệnh nhân</text>
  
  <!-- SINH VIÊN Use Cases -->
  <ellipse class="usecase" cx="780" cy="320" rx="65" ry="26"/>
  <text class="text-usecase" x="780" y="316">Xác minh</text>
  <text class="text-usecase" x="780" y="328">tài khoản</text>
  
  <ellipse class="usecase" cx="780" cy="390" rx="65" ry="26"/>
  <text class="text-usecase" x="780" y="386">Đăng bài</text>
  <text class="text-usecase" x="780" y="398">ứng tuyển</text>
  
  <ellipse class="usecase" cx="780" cy="460" rx="70" ry="22"/>
  <text class="text-usecase" x="780" y="464">Bình luận ứng tuyển</text>
  
  <!-- ADMIN Use Cases -->
  <ellipse class="usecase" cx="290" cy="600" rx="65" ry="26"/>
  <text class="text-usecase" x="290" y="596">Quản lý</text>
  <text class="text-usecase" x="290" y="608">người dùng</text>
  
  <ellipse class="usecase" cx="290" cy="670" rx="65" ry="22"/>
  <text class="text-usecase" x="290" y="674">Khóa/Mở tài khoản</text>
  
  <ellipse class="usecase" cx="440" cy="600" rx="60" ry="22"/>
  <text class="text-usecase" x="440" y="604">Duyệt xác minh</text>
  
  <ellipse class="usecase" cx="440" cy="670" rx="55" ry="22"/>
  <text class="text-usecase" x="440" y="674">Xử lý báo cáo</text>
  
  <ellipse class="usecase" cx="590" cy="600" rx="60" ry="26"/>
  <text class="text-usecase" x="590" y="596">Quản lý</text>
  <text class="text-usecase" x="590" y="608">bài đăng</text>
  
  <ellipse class="usecase" cx="590" cy="670" rx="55" ry="22"/>
  <text class="text-usecase" x="590" y="674">Xóa bài vi phạm</text>
  
  <ellipse class="usecase" cx="740" cy="635" rx="60" ry="26"/>
  <text class="text-usecase" x="740" y="631">Thống kê</text>
  <text class="text-usecase" x="740" y="643">hệ thống</text>
  
  <!-- ==================== CONNECTIONS ==================== -->
  
  <!-- Khách connections -->
  <line class="line" x1="980" y1="120" x2="870" y2="80"/>
  <line class="line" x1="980" y1="120" x2="675" y2="220"/>
  <line class="line" x1="980" y1="120" x2="670" y2="290"/>
  
  <!-- Include: Đăng ký -> Xác minh email -->
  <line class="line-dashed" x1="800" y1="104" x2="800" y2="148"/>
  <text class="text-relation" x="820" y="128">«include»</text>
  
  <!-- Người dùng connections -->
  <line class="line" x1="120" y1="220" x2="265" y2="150"/>
  <line class="line" x1="120" y1="220" x2="270" y2="220"/>
  <line class="line" x1="120" y1="220" x2="525" y2="220"/>
  <line class="line" x1="120" y1="220" x2="530" y2="290"/>
  
  <!-- Include: Đăng nhập -> Kiểm tra thông tin -->
  <line class="line-dashed" x1="320" y1="128" x2="320" y2="96"/>
  <text class="text-relation" x="340" y="115">«include»</text>
  
  <!-- Extend: Kiểm tra -> Xử lý lỗi -->
  <line class="line-dashed" x1="390" y1="70" x2="435" y2="70"/>
  <text class="text-relation" x="412" y="62">«extend»</text>
  
  <!-- Include: Đăng nhập -> Đăng xuất -->
  <line class="line-dashed" x1="320" y1="172" x2="320" y2="200"/>
  <text class="text-relation" x="340" y="188">«include»</text>
  
  <!-- Bệnh nhân connections -->
  <line class="line" x1="120" y1="420" x2="250" y2="360"/>
  <line class="line" x1="120" y1="420" x2="255" y2="430"/>
  <line class="line" x1="120" y1="420" x2="265" y2="495"/>
  <line class="line" x1="120" y1="420" x2="495" y2="380"/>
  <line class="line" x1="120" y1="420" x2="480" y2="450"/>
  <line class="line" x1="120" y1="420" x2="350" y2="530"/>
  
  <!-- Sinh viên connections -->
  <line class="line" x1="980" y1="420" x2="845" y2="320"/>
  <line class="line" x1="980" y1="420" x2="845" y2="390"/>
  <line class="line" x1="980" y1="420" x2="850" y2="460"/>
  <line class="line" x1="980" y1="420" x2="605" y2="380"/>
  <line class="line" x1="980" y1="420" x2="620" y2="450"/>
  <line class="line" x1="980" y1="420" x2="750" y2="530"/>
  <line class="line" x1="980" y1="420" x2="675" y2="220"/>
  <line class="line" x1="980" y1="420" x2="670" y2="290"/>
  
  <!-- Admin connections -->
  <line class="line" x1="120" y1="640" x2="225" y2="600"/>
  <line class="line" x1="120" y1="640" x2="225" y2="670"/>
  <line class="line" x1="120" y1="640" x2="380" y2="600"/>
  <line class="line" x1="120" y1="640" x2="385" y2="670"/>
  <line class="line" x1="120" y1="640" x2="530" y2="600"/>
  <line class="line" x1="120" y1="640" x2="535" y2="670"/>
  <line class="line" x1="120" y1="640" x2="680" y2="635"/>
  <!-- Admin -> Xem danh sách bài đăng -->
  <line class="line" x1="120" y1="640" x2="525" y2="220"/>
  <!-- Admin -> Tìm kiếm bài đăng -->
  <line class="line" x1="120" y1="640" x2="530" y2="290"/>
  
  <!-- Generalization: Bệnh nhân -> Người dùng -->
  <line class="line" x1="100" y1="350" x2="100" y2="295"/>
  <polygon points="100,295 95,308 105,308" fill="#333"/>
  
</svg>