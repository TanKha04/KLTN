<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100">
  <defs>
    <style>
      .entity { fill: #9FE0E0; stroke: #2a2a2a; stroke-width: 0.7; }
      .entity-header { fill: #7FCFCF; stroke: #2a2a2a; stroke-width: 0.7; }
      .rel-ellipse { fill: #C8C0D8; stroke: #2a2a2a; stroke-width: 0.7; }
      .text { font-family: Arial, sans-serif; font-size: 8px; fill: #000; }
      .text-header { font-family: Arial, sans-serif; font-size: 9px; fill: #000; font-weight: bold; }
      .text-small { font-family: Arial, sans-serif; font-size: 6px; fill: #333; }
      .text-rel { font-family: Arial, sans-serif; font-size: 7px; fill: #000; }
      .text-type { font-family: Arial, sans-serif; font-size: 7px; fill: #000; }
      .line { stroke: #2a2a2a; stroke-width: 0.7; fill: none; }
      .pk { text-decoration: underline; }
    </style>
  </defs>

  <!-- ==================== USER Entity (Center) ==================== -->
  <g transform="translate(520, 280)">
    <rect class="entity-header" x="0" y="0" width="170" height="18"/>
    <text class="text-header" x="85" y="13" text-anchor="middle">USER</text>
    <rect class="entity" x="0" y="18" width="170" height="130"/>
    <text class="text pk" x="5" y="32">id</text>
    <text class="text-small" x="40" y="32">&lt;pk&gt;</text>
    <text class="text-type" x="70" y="32">int(11)</text>
    <text class="text-small" x="130" y="32">&lt;M&gt;</text>
    <text class="text" x="5" y="44">Fullname</text>
    <text class="text-type" x="70" y="44">varchar(50)</text>
    <text class="text" x="5" y="56">Email</text>
    <text class="text-type" x="70" y="56">varchar(60)</text>
    <text class="text" x="5" y="68">Role</text>
    <text class="text-type" x="70" y="68">varchar(20)</text>
    <text class="text" x="5" y="80">Isactive</text>
    <text class="text-type" x="70" y="80">Boolean</text>
    <text class="text" x="5" y="92">SDT</text>
    <text class="text-type" x="70" y="92">varchar(10)</text>
    <text class="text" x="5" y="104">Address</text>
    <text class="text-type" x="70" y="104">varchar(50)</text>
    <line x1="0" y1="140" x2="170" y2="140" class="line"/>
    <text class="text-small" x="5" y="145">Identifier_1 &lt;pi&gt;</text>
  </g>

  <!-- ==================== POST Entity ==================== -->
  <g transform="translate(520, 580)">
    <rect class="entity-header" x="0" y="0" width="170" height="18"/>
    <text class="text-header" x="85" y="13" text-anchor="middle">POST</text>
    <rect class="entity" x="0" y="18" width="170" height="95"/>
    <text class="text pk" x="5" y="32">id</text>
    <text class="text-small" x="40" y="32">&lt;pk&gt;</text>
    <text class="text-type" x="70" y="32">int(11)</text>
    <text class="text-small" x="130" y="32">&lt;M&gt;</text>
    <text class="text" x="5" y="44">Title</text>
    <text class="text-type" x="70" y="44">varchar(100)</text>
    <text class="text" x="5" y="56">Description</text>
    <text class="text-type" x="70" y="56">Text</text>
    <text class="text" x="5" y="68">Price</text>
    <text class="text-type" x="70" y="68">Float</text>
    <text class="text" x="5" y="80">CreatedAt</text>
    <text class="text-type" x="70" y="80">Date</text>
    <line x1="0" y1="105" x2="170" y2="105" class="line"/>
    <text class="text-small" x="5" y="110">Identifier_1 &lt;pi&gt;</text>
  </g>

  <!-- ==================== COMMENT Entity ==================== -->
