    <text class="text-type" x="75" y="44">varchar(50)</text>
    <text class="text" x="5" y="56">Description</text>
    <text class="text-type" x="75" y="56">Text</text>
    <line x1="0" y1="80" x2="150" y2="80" class="line"/>
    <text class="text-small" x="5" y="85">Identifier_1 &lt;pi&gt;</text>
  </g>

  <!-- ==================== bi_baocao Entity (Relationship table) ==================== -->
  <g transform="translate(950, 450)">
    <rect class="entity-header" x="0" y="0" width="150" height="18"/>
    <text class="text-header" x="75" y="13" text-anchor="middle">bi_baocao</text>
