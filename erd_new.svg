    <text class="text" x="5" y="80">CreatedAt</text>
    <text class="text-type" x="75" y="80">Date</text>
    <line x1="0" y1="105" x2="170" y2="105" class="line"/>
    <text class="text-small" x="5" y="110">Identifier_1 &lt;pi&gt;</text>
  </g>

  <!-- ==================== MESSAGE Entity ==================== -->
  <g transform="translate(950, 180)">
    <rect class="entity-header" x="0" y="0" width="150" height="18"/>
    <text class="text-header" x="75" y="13" text-anchor="middle">MESSAGE</text>
